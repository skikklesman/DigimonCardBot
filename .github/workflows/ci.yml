name: CI

on:
  push:
  pull_request:
    # Runs on PRs from forks (which push events don't cover). The branches
    # filter avoids double-running on PRs from branches in this repo.
    branches: [master]

jobs:
  checks:
    name: Typecheck, lint, format, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  deploy:
    name: Deploy (stub)
    needs: checks
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Real deploy lands with chunk 0.5 (docs/ROADMAP.md): cloudflare/wrangler-action
      # with a CLOUDFLARE_API_TOKEN repo secret, followed by the post-deploy smoke
      # script (chunk 3.5, docs/TESTING.md §4).
      - run: echo "Deploy step stubbed — activated in chunk 0.5."

name: CI

on:
  push:
  pull_request:
    # Runs on PRs from forks (which push events don't cover). The branches
    # filter avoids double-running on PRs from branches in this repo.
    branches: [master]

jobs:
  checks:
    name: Typecheck, lint, format, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  deploy:
    name: Deploy + smoke
    needs: checks
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Secrets aren't readable in job-level `if`s; gate via a step output.
      # Without a CLOUDFLARE_API_TOKEN repo secret, deploys stay manual
      # (wrangler deploy from the dev machine) and CI still smoke-checks
      # the live production Worker on every master push.
      - id: gate
        run: echo "deploy=${{ secrets.CLOUDFLARE_API_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - name: Deploy to Cloudflare
        if: steps.gate.outputs.deploy == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy skipped (no CLOUDFLARE_API_TOKEN secret)
        if: steps.gate.outputs.deploy != 'true'
        run: echo "CI deploy inactive — add the CLOUDFLARE_API_TOKEN repo secret to enable. Smoke still runs against production."
      # Post-deploy smoke (TESTING.md §4): a failed smoke fails the pipeline loudly.
      - name: Smoke-check the live Worker
        run: npm run smoke

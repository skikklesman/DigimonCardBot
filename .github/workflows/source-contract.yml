# Weekly source-contract check (TESTING.md §5): Saturdays 06:00 UTC — same
# hour as the sync cron since the cron-dialect finding (DECISIONS.md
# 2026-07-07; the day-early stagger was consciously dropped; moved Mon->Sat
# 2026-07-10). Note GitHub cron IS Unix dialect: `6` below really is
# Saturday (Cloudflare's `7` = Saturday does NOT apply here). Writes nothing anywhere.
name: Source contract

on:
  schedule:
    - cron: "0 6 * * 6"
  workflow_dispatch: # manual trigger for testing

jobs:
  contract:
    name: Fetch real source through the validation gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # SYNC_ALERT_WEBHOOK is an optional repo secret — with it, failures
      # ping the alert channel; without it, the red run (and GitHub's
      # failure email) is the signal.
      - run: npm run source-contract
        env:
          SYNC_ALERT_WEBHOOK: ${{ secrets.SYNC_ALERT_WEBHOOK }}

# Worker config — bindings + schedule only. NO SECRETS (HANDOFF §10).
# Secrets go in via `wrangler secret put` (deployed) / .dev.vars (local).

name = "digimon-tcg-bot"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Card cache (HANDOFF §5). Migrations live in ./migrations (wrangler default).
[[d1_databases]]
binding = "DB"
database_name = "cards"
database_id = "004a6c30-4560-4990-9b41-2bf7805bb94e"

# Weekly sync (HANDOFF §3). CRON DIALECT WARNING: Cloudflare numbers
# days-of-week from 1 = Sunday, so `7` here means SATURDAY 06:00 UTC — not
# Unix cron's Tuesday. Discovered when the expected Jul 7 fire never
# existed; owner changed the schedule to Saturday (DECISIONS.md
# 2026-07-10). Spell days by NAME (MON, TUE) in any future edit.
[triggers]
crons = ["0 6 * * 7"] # Saturdays 06:00 UTC

# Worker config — bindings + schedule only. NO SECRETS (HANDOFF §10).
# Secrets go in via `wrangler secret put` (deployed) / .dev.vars (local).

name = "digimon-tcg-bot"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Card cache (HANDOFF §5). Migrations live in ./migrations (wrangler default).
[[d1_databases]]
binding = "DB"
database_name = "cards"
database_id = "004a6c30-4560-4990-9b41-2bf7805bb94e"

# Weekly sync (HANDOFF §3). Tuesdays — not the sketch's Monday — so the
# CI source-contract check (Mondays 06:00 UTC) fires a day AHEAD of the
# sync (TESTING.md §5); rationale in DECISIONS.md 2026-07-06.
[triggers]
crons = ["0 6 * * 2"] # Tuesdays 06:00 UTC

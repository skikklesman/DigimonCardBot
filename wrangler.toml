# Worker config — bindings + schedule only. NO SECRETS (HANDOFF §10).
# Secrets go in via `wrangler secret put` (deployed) / .dev.vars (local).

name = "digimon-tcg-bot"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Card cache (HANDOFF §5). Migrations live in ./migrations (wrangler default).
[[d1_databases]]
binding = "DB"
database_name = "cards"
database_id = "004a6c30-4560-4990-9b41-2bf7805bb94e"

# Weekly sync (HANDOFF §3). CRON DIALECT WARNING: Cloudflare numbers
# days-of-week from 1 = Sunday, so `2` here means MONDAY 06:00 UTC — not
# Unix cron's Tuesday. Discovered when the expected Jul 7 fire never
# existed; owner kept the de-facto Monday schedule (DECISIONS.md
# 2026-07-07). Spell days by NAME (MON, TUE) in any future edit.
# TEMPORARY second entry: one-off recovery run Wed 2026-07-08 06:00 UTC —
# the mis-read weekly schedule has no fire before Jul 13 (OWNER-TODO,
# soak section). REMOVE after it fires.
[triggers]
crons = ["0 6 * * 2", "0 6 8 7 *"] # Mondays 06:00 UTC + one-off Jul 8
